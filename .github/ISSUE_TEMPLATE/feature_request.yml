name: Feature request
description: Suggest an improvement or new capability.
title: "Feature: "
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow, not private financial details. Use synthetic
        or generalized examples instead of real transaction data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should finjuice do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful for scope decisions.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Import / ingest
        - Tagging rules
        - Transfer detection
        - Export / reports
        - Skills / agent workflow
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact check
      options:
        - label: This request can be discussed without sharing private financial data.
          required: true
        - label: I noted whether this may affect public CLI JSON or schema contracts.
