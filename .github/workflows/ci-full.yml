# Full CI for Weekly / Manual Reliability Checks
# Issue: #243
# Purpose: Run heavier checks outside the default PR/main smoke gate.

name: Full CI (Scheduled/Manual)

on:
  schedule:
    # Weekly on Monday at 01:30 UTC
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Default interpreter for non-matrix jobs. Must match `.python-version` (3.13);
  # see #418 for the label-vs-runner mismatch this prevents.
  PYTHON_VERSION: "3.13"

jobs:
  # ============================================================
  # Job 1: Test Matrix
  #
  # `UV_PYTHON` is required for matrix coverage to be real:
  # without it `uv sync` falls back to `.python-version` (3.13) and every
  # matrix cell silently runs the same interpreter (#418).
  # ============================================================
  test-matrix:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Setup test environment
        run: |
          mkdir -p data/metadata
          cp templates/schema.yaml data/metadata/schema.yaml

      - name: Run tests (Python 3.13 with coverage gate)
        if: matrix.python-version == '3.13'
        run: |
          uv run pytest \
            --cov=src/finjuice \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -v

      - name: Run tests (Python 3.10/3.11/3.12 baseline)
        if: matrix.python-version != '3.13'
        run: uv run pytest -v

      - name: Upload coverage report (Python 3.13)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ============================================================
  # Job 2: Type Checking (mypy)
  # ============================================================
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        # Note: Some type errors exist in legacy code due to Polars/pandas dual-backend.
        # Using --ignore-missing-imports and continue-on-error until cleanup issue addressed.
        run: uv run mypy src/ --ignore-missing-imports
        continue-on-error: true

  # ============================================================
  # Job 3: Security baseline gate
  # ============================================================
  security:
    name: Security Baselines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check security scan baselines
        run: uv run python scripts/check_security_baselines.py

      - name: Upload security scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-scan-reports
          path: |
            bandit-report.json
            audit-report.json
          retention-days: 30
