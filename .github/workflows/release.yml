# Release Workflow
# Issue: #16
# Purpose: Automated release creation when tags are pushed
#
# Note: Uses GitHub-hosted runners for public repository reliability

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Set up Python
        run: uv python install 3.12

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          {
            echo "version=$VERSION"
            echo "tag=${GITHUB_REF#refs/tags/}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref }}^" 2>/dev/null || echo "")

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "Changes since $PREV_TAG:"
              echo ""
              git log --pretty=format:"- %s (%h)" "$PREV_TAG..${{ github.ref }}"
            else
              echo "Initial release"
            fi

            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}"
          } > CHANGELOG.md

      - name: Build package artifacts
        run: uv build --out-dir dist --clear

      - name: Verify package contents
        # Fail early if the built wheel/sdist is missing expected files. Mirrors
        # the gate the CI workflow runs on every PR; we run it again here so a
        # tag-driven release can never publish a malformed artifact.
        run: uv run python scripts/check_package_contents.py

      - name: Smoke-test installed artifact
        run: uv run python scripts/smoke_installed_artifact.py

      - name: Smoke-test installed CLI JSON surface
        run: uv run python scripts/smoke_installed_cli_json.py

      - name: Prepare release asset directory
        run: mkdir -p release-assets

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: release-assets/finjuice-${{ steps.version.outputs.tag }}.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release artifacts
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/*

      - name: Copy attestation bundle
        run: |
          cp \
            "${{ steps.attest.outputs.bundle-path }}" \
            "release-assets/finjuice-${{ steps.version.outputs.tag }}.provenance.jsonl"

      - name: Upload release artifact backup
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: finjuice-release-${{ steps.version.outputs.tag }}-artifacts
          path: |
            dist/*
            release-assets/*
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/*
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Build and publish to PyPI
  # Keep disabled until docs/development/pypi-trusted-publishing.md gates are green.
