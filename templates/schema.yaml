# Schema Registry for CSV Partition Storage
# Tracks schema versions, column definitions, and migration history
# This file serves as the source of truth for data schema evolution

# Schema File Format Version
schema_file_version: 1

# Current Active Schema
current_version: 4
minimum_compatible_version: 2

# Registry Metadata
metadata:
  created_at: "2025-11-04"
  updated_at: "2026-06-09"
  project: "finjuice"
  storage_type: "csv_partition"
  partition_pattern: "data/transactions/YYYY/MM/transactions.csv"
  description: "Personal finance transaction data partitioned by year/month"

# Schema Definitions
schemas:
  v4:
    active: true
    introduced: "2026-06-09"
    issue: "#14"
    description: "Row-level manual notes plus category system for accurate report aggregation"
    read_compatible_missing_columns:
      ["category_rule", "category_final", "is_transfer_candidate", "notes_manual"]

    # Performance Metrics
    metrics:
      csv_columns: 28
      new_columns: ["notes_manual"]
      category_priority_chain: "manual category override > category_rule > minor_raw > major_raw > '미분류'"
      aggregation_accuracy: "100% (no duplicate counting)"
      note: "Separates category (single, for aggregation), tags (multiple, for filtering), and transfer candidate vs confirmed state"

    # Partition Configuration
    partition_schema:
      location_pattern: "data/transactions/YYYY/MM/transactions.csv"
      format: "CSV"
      encoding: "utf-8"
      delimiter: ","
      header: true
      sort_by: "datetime"
      line_terminator: "\n"

      # Column Definitions (28 columns - v3 plus notes_manual)
      columns:
        # ========================================
        # Identity & Deduplication
        # ========================================
        - name: row_hash
          type: string
          length: 16
          nullable: false
          description: "SHA256[:16] transaction hash for deduplication"
          pattern: "^[0-9a-f]{16}$"
          example: "ac875c7391d4e2f8"
          note: "Increased from 10 to 16 chars (Issue #81) for negligible collision risk"

        # ========================================
        # Temporal Fields
        # ========================================
        - name: date
          type: date
          format: "YYYY-MM-DD"
          nullable: false
          description: "Transaction date"
          example: "2025-07-23"

        - name: time
          type: time
          format: "HH:MM"
          nullable: false
          description: "Transaction time (24-hour format)"
          example: "08:33"

        # ========================================
        # Transaction Type
        # ========================================
        - name: type_raw
          type: string
          nullable: true
          description: "Raw transaction type from Banksalad export"
          example: "지출"
          values: ["지출", "수입", "이체"]

        - name: type_norm
          type: string
          nullable: false
          enum: ["expense", "income", "transfer", "other"]
          description: "Normalized transaction type for analytics"
          mapping:
            expense: "Expenses (negative amount)"
            income: "Income (positive amount)"
            transfer: "Internal transfers (excluded from reports)"
            other: "Unclassified transactions"

        # ========================================
        # Categories (Banksalad Native)
        # ========================================
        - name: major_raw
          type: string
          nullable: true
          description: "Major category from Banksalad (대분류)"
          example: "식비"
          note: "Preserved as-is from Banksalad, used as category fallback"

        - name: minor_raw
          type: string
          nullable: true
          description: "Minor category from Banksalad (소분류)"
          example: "카페"
          note: "Preserved as-is from Banksalad, used as category fallback (priority over major_raw)"

        # ========================================
        # Transaction Details
        # ========================================
        - name: merchant_raw
          type: string
          nullable: true
          description: "Merchant name from Banksalad export"
          example: "(주)카카오"
          note: "Used for rule matching and transfer detection"

        - name: memo_raw
          type: string
          nullable: true
          description: "User memo field from Banksalad export"
          note: "Excluded from row_hash calculation"

        - name: notes_manual
          type: string
          nullable: true
          default: ""
          description: "Manual row-level explanatory note controlled by finjuice users or agents"
          example: "3개월 할부"
          note: "Excluded from row_hash, tag aggregation, category aggregation, and audit content"

        - name: amount
          type: float
          nullable: false
          description: "Transaction amount (negative for expenses, positive for income)"
          example: "152129.0"
          convention: "Expenses are negative, income is positive"

        - name: account
          type: string
          nullable: false
          description: "Account or card name"
          example: "삼성카드법인"
          note: "Used for transfer pairing and account-level reports"

        - name: currency
          type: string
          nullable: false
          default: "KRW"
          description: "Currency code (ISO 4217)"
          example: "KRW"
          note: "Currently only KRW supported"

        - name: counterparty
          type: string
          nullable: true
          description: "Counterparty account for transfer transactions"
          example: "우리은행"
          note: "Used for transfer detection"

        - name: datetime
          type: datetime
          format: "ISO8601"
          nullable: false
          description: "Combined datetime for sorting and time-based matching"
          example: "2025-07-23T08:33:00"
          note: "Generated from date + time fields"

        # ========================================
        # Category System (NEW in v3 - Issue #166)
        # ========================================
        - name: category_rule
          type: string
          nullable: true
          description: "Category assigned by rules.yaml (single value for aggregation)"
          example: "온라인쇼핑"
          note: "Set by the highest-priority matching enabled rule that has a non-empty category"

        - name: category_final
          type: string
          nullable: false
          default: "미분류"
          description: "Final category for report aggregation (no duplicates)"
          example: "온라인쇼핑"
          calculation: "manual category override, then COALESCE(category_rule, minor_raw, major_raw, '미분류')"
          note: "Manual category override wins; otherwise a single category value is used for spending reports"

        # ========================================
        # Tagging System (Attribute Tags for Filtering)
        # ========================================
        - name: tags_rule
          type: json_array
          nullable: false
          default: "[]"
          description: "Attribute tags applied by all matching enabled rules"
          example: '["정기지출", "해외결제"]'
          note: "Rules are evaluated by priority; matching rule tags are deduplicated while preserving first-seen order"

        - name: tags_ai
          type: json_array
          nullable: false
          default: "[]"
          description: "AI-generated tags (optional, Phase 2+)"
          example: '["업무식대"]'
          note: "Not yet implemented"

        - name: tags_manual
          type: json_array
          nullable: false
          default: "[]"
          description: "User-added tags via review queue"
          example: '["의료"]'
          note: "Visible manual tags merge into tags_final; an internal marker may persist a category_final override"

        - name: tags_final
          type: json_array
          nullable: false
          default: "[]"
          description: "Final merged attribute tag list (rule + AI + manual)"
          example: '["정기지출", "해외결제", "의료"]'
          note: "Merges rule tags, AI tags, and visible manual tags with stable deduplication; not used for spending aggregation"

        - name: confidence
          type: float
          nullable: true
          range: [0.0, 1.0]
          description: "Binary tagging coverage confidence, not model confidence"
          example: 1.0
          note: "Currently 1.0 when tags_final is non-empty, otherwise 0.0; below 0.7 triggers needs_review"

        - name: needs_review
          type: integer
          nullable: true
          enum: [0, 1]
          description: "Flag derived from coverage confidence (1 when confidence < 0.7)"
          default: 0

        # ========================================
        # Transfer Detection
        # ========================================
        - name: is_transfer_candidate
          type: integer
          nullable: true
          enum: [0, 1]
          description: "Transfer-like candidate flag from raw transaction type (1=candidate, not necessarily excluded)"
          default: 0
          detection: "Set when type_raw contains transfer-like text such as 이체"
          note: "Candidates without a confirmed pair remain reportable spend"

        - name: is_transfer
          type: integer
          nullable: true
          enum: [0, 1]
          description: "Confirmed internal transfer flag (1=confirmed paired transfer, excluded from expense reports)"
          detection: "Matched by amount, time window (±5min), opposite signs, category, and currency"

        - name: transfer_group_id
          type: string
          nullable: true
          description: "Groups paired transfers (debit/credit)"
          example: "transfer_20250723_152129"
          note: "Same ID for both sides of a confirmed transfer; null for unconfirmed candidates"

        # ========================================
        # Source Tracking (Issue #59 Optimization)
        # ========================================
        - name: file_id
          type: string
          min_length: 8
          common_length: 8
          nullable: false
          pattern: "^(?:\\d{6}_\\d+|[0-9a-f]{8})$"
          description: "Compact source file identifier (YYMMDD_N or 8-char hash fallback)"
          example: "241027_1"
          examples: ["241027_1", "241027_100", "89dc2f27"]
          references: "data/metadata/import_history.csv"
          note: "Dated Banksalad filenames use YYMMDD_N; non-standard filenames use SHA256[:8]. Sequence suffixes may grow beyond one digit."

        - name: source_row
          type: integer
          nullable: false
          description: "Row number in source XLSX file (1-indexed)"
          example: 597
          note: "Enables traceability back to original import file"

