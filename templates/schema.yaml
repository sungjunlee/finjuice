# Asset Snapshot Schema (Issue #223)
asset_schemas:
  snapshot_v0:
    active: true
    introduced: "2026-02-24"
    issue: "#223"
    description: "Snapshot-first asset SSOT separated from transaction domain"
    partition_schema:
      location_pattern: "data/assets/snapshots/YYYY/MM/snapshots.csv"
      format: "CSV"
      encoding: "utf-8"
      delimiter: ","
      header: true
      sort_by: "snapshot_date,account_id,instrument_id"
      line_terminator: "\n"
    required_columns:
      - snapshot_date
      - account_id
      - instrument_id
      - quantity
      - market_value
      - currency
      - file_id
      - source_row
    key_policy:
      dedup_grain: "daily"
      dedup_key: ["snapshot_date", "account_id", "instrument_id"]
      account_id:
        source_priority: ["account_id", "account_name"]
        fallback: "acc_<sha256(normalized_source)[:12]>"
      instrument_id:
        source_priority: ["instrument_id", "instrument_name"]
        fallback: "ins_<sha256(normalized_source)[:12]>"
      snapshot_date:
        source_priority: ["sheet_snapshot_date", "file_mtime_local_date"]
    columns:
      - name: snapshot_date
        type: date
        format: "YYYY-MM-DD"
        nullable: false
        description: "Snapshot 기준일"
      - name: account_id
        type: string
        nullable: false
        description: "계좌 식별자 (원본 우선, 없으면 파생 ID)"
      - name: instrument_id
        type: string
        nullable: false
        description: "종목 식별자 (원본 우선, 없으면 파생 ID)"
      - name: quantity
        type: float
        nullable: false
        description: "보유 수량"
      - name: market_value
        type: float
        nullable: false
        description: "평가 금액"
      - name: currency
        type: string
        nullable: false
        default: "KRW"
        description: "통화 코드 (ISO 4217)"
      - name: file_id
        type: string
        min_length: 8
        common_length: 8
        nullable: false
        pattern: "^(?:\\d{6}_\\d+|[0-9a-f]{8})$"
        description: "import_history.csv 연계 파일 식별자 (YYMMDD_N 또는 8-char hash fallback)"
      - name: source_row
        type: integer
        nullable: false
        description: "원본 시트 행 번호 (1-indexed)"

# Migration History
migrations:
  - version: 3
    from_version: 2
    issue: "#166"
    title: "Category System for Accurate Aggregation"
    description: "Add category_rule and category_final fields to eliminate duplicate counting in reports"
    script: "scripts/migrate_schema_v3.py"
    author: "Claude Code"

    # Detailed Changes
    changes:
      - type: "add"
        field: "category_rule"
        change: "New nullable string field for rule-based category"
        impact: "+15 chars per row (average)"
        purpose: "Single category from rules.yaml for spending aggregation"

      - type: "add"
        field: "category_final"
        change: "Calculated category for aggregation (COALESCE chain)"
        impact: "+15 chars per row (average)"
        purpose: "Final category = manual override ?? category_rule ?? minor_raw ?? major_raw ?? '미분류'"

      - type: "add"
        field: "is_transfer_candidate"
        change: "Added nullable integer flag for transfer-like raw rows before pair confirmation"
        impact: "+2 chars per row (average)"
        purpose: "Keep unpaired transfer-like spending reportable while still auditing candidates"

      - type: "modify"
        field: "is_transfer"
        change: "Clarified as confirmed paired-transfer flag; report filters also require transfer_group_id"
        impact: "Legacy unpaired rows with is_transfer=1 and blank transfer_group_id are no longer excluded"
        purpose: "Separate candidate review state from report-exclusion state"

      - type: "modify"
        field: "tags_final"
        change: "Role changed from aggregation to filtering only"
        impact: "No structural change"
        purpose: "Tags are now for attribute filtering, not spending aggregation"

    # Migration Strategy
    migration_strategy:
      auto_migration: true
      category_final_calculation: "manual category override, then COALESCE(category_rule, minor_raw, major_raw, '미분류')"
      backward_compatible: true
      runtime_path: "finjuice refresh runs transaction writer paths that backfill category_rule/category_final and is_transfer_candidate, even when rules.yaml is missing and tagging is skipped"
      manual_script: "scripts/migrate_schema_v3.py is optional for dry-run or eager one-time partition rewrite; it is not required for ordinary refresh upgrades"
      note: "v3 readers can read v2-shaped partitions; append/tag/transfer/write_month writes persist the v3 columns; reports exclude only confirmed transfer pairs"

  - version: 2
    from_version: 1
    issue: "#59"
    title: "CSV Metadata Optimization"
    description: "Reduced token consumption by 89% through hash truncation and file_id system"
    script: "scripts/migrate_csv_metadata.py"
    executed_at: "2025-11-03T20:45:30Z"
    author: "Claude Code"

    # Detailed Changes
    changes:
      - type: "optimize"
        field: "row_hash"
        change: "Truncated from 64 chars (full SHA256 hex) to 16 chars"
        impact: "-54 chars per row"
        collision_probability: "<0.001% for 100K transactions"

      - type: "add"
        field: "file_id"
        change: "Added compact identifier (YYMMDD_N for dated filenames, SHA256[:8] fallback for non-standard filenames)"
        impact: "+8 chars per row in the common case; longer when YYMMDD_N sequence suffix exceeds one digit"
        purpose: "Replace verbose file path + mtime with compact reference"

      - type: "remove"
        field: "source_file_path"
        change: "Removed ~80 char absolute file path"
        impact: "-80 chars per row"
        replacement: "Moved to data/metadata/import_history.csv"

      - type: "remove"
        field: "source_file_mtime"
        change: "Removed 26-char ISO timestamp"
        impact: "-26 chars per row"
        replacement: "Moved to data/metadata/import_history.csv"

      - type: "add_metadata"
        file: "data/metadata/import_history.csv"
        change: "Centralized file_id → import history tracking"
        schema: "file_id, original_filename, imported_from, archived, archived_path, imported_at, source_rows"

    # Migration Results
    results:
      partitions_migrated: 13
      rows_migrated: 2269
      status: "completed"
      net_savings: "152 chars per row = 89% metadata reduction"
      token_efficiency: "40-50% overall improvement"
      file_id_registry_rows: 1

# Schema Compatibility Matrix
compatibility:
  v4:
    compatibility_status: "active"
    migration_status: "Active read/write schema; older readable partitions are upgraded on write."
    can_read: [2, 3, 4]  # v4 readers can read compatible v2/v3/v4 files
    can_write: [4]  # v4 writers write v4 format
    breaking_changes_from_v3:
      - "notes_manual field added (nullable string)"
    breaking_changes_from_v2:
      - "category_rule field added (nullable string)"
      - "category_final field added (calculated, not null)"
      - "is_transfer_candidate field added (nullable integer)"
      - "tags_final role changed (filtering only, not aggregation)"
    migration_required: false  # Auto-migration via COALESCE
    runtime_migration: "Run finjuice refresh to process existing partitions; transaction writers backfill notes_manual, category_rule/category_final, and is_transfer_candidate even if rules.yaml is missing and tagging is skipped."
    manual_migration: "No eager migration required; write paths persist v4 columns after normal mutations. scripts/migrate_schema_v3.py remains optional only for eager v2→v3 category rewrites."
    note: "v4 is backward compatible: runtime readers tolerate compatible older partitions, append/tag/transfer/write_month writes persist v4 columns, and notes_manual remains outside row_hash and aggregation."

  v2:
    compatibility_status: "compatible-legacy"
    migration_status: "Readable by v3 as an inactive legacy schema; run finjuice refresh to rewrite partitions to v3 when convenient."
    can_read: [2]  # Only v2 readers can read v2 files
    can_write: [2]  # Only v2 writers can write v2 files
    breaking_changes_from_v1:
      - "row_hash field length changed (64 → 16 chars)"
      - "source_file_path removed (replaced by file_id)"
      - "source_file_mtime removed (moved to import_history.csv)"
      - "file_id field added (requires lookup in import_history.csv)"
    migration_required: true

# Validation Rules
validation_rules:
  - rule: "row_hash must be exactly 16 lowercase hex characters"
    field: "row_hash"
    regex: "^[0-9a-f]{16}$"
    severity: "error"

  - rule: "file_id must follow YYMMDD_N or 8-char lowercase hex hash fallback pattern"
    field: "file_id"
    regex: "^(?:\\d{6}_\\d+|[0-9a-f]{8})$"
    severity: "error"

  - rule: "date must be valid ISO date"
    field: "date"
    format: "YYYY-MM-DD"
    severity: "error"

  - rule: "type_norm must be one of: expense, income, transfer, other"
    field: "type_norm"
    enum: ["expense", "income", "transfer", "other"]
    severity: "error"

  - rule: "tags fields must be valid JSON arrays"
    fields: ["tags_rule", "tags_ai", "tags_manual", "tags_final"]
    format: "json_array"
    severity: "error"

  - rule: "transfer/review flags must be 0 or 1 (or null)"
    fields: ["is_transfer_candidate", "is_transfer", "needs_review"]
    enum: [0, 1, null]
    severity: "error"

  - rule: "confidence must be between 0.0 and 1.0"
    field: "confidence"
    range: [0.0, 1.0]
    severity: "warning"

  - rule: "amount cannot be zero"
    field: "amount"
    constraint: "!= 0"
    severity: "warning"
    note: "Zero-amount transactions are unusual"

  - rule: "category_final must not be empty"
    field: "category_final"
    constraint: "NOT NULL AND != ''"
    severity: "error"
    note: "category_final is required for report aggregation"

  - rule: "category_rule should be single value (no comma/array)"
    field: "category_rule"
    regex: "^[^,\\[\\]]*$"
    severity: "warning"
    note: "category is for single-value aggregation, not multi-value like tags"

# Data Quality Guidelines
quality_guidelines:
  deduplication:
    method: "row_hash"
    collision_handling: "First occurrence wins"
    note: "16-char hash provides negligible collision risk for personal finance scale"

  transfer_detection:
    time_window: "±5 minutes"
    amount_tolerance: "0.01 (1%)"
    pairing_strategy: "Greedy matching by amount and time"

  tagging:
    rule_priority: "Descending (highest first)"
    rule_matching: "All matching enabled rules contribute tags; highest-priority matching category wins"
    confidence_threshold: 0.7
    review_queue: "confidence < 0.7; confidence is currently 0.0 when tags_final is empty"

  token_efficiency:
    target: "8K tokens per month partition (~200 rows)"
    baseline: "170K tokens for full dataset"
    achieved: "21x efficiency through partitioning + 50% through metadata optimization"

